<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Apple Style Taxi Meter Pro</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root { --apple-blue: #007AFF; --apple-bg: #F2F2F7; }
        body { font-family: -apple-system, sans-serif; margin: 0; background: var(--apple-bg); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        #map { flex: 1; width: 100%; z-index: 1; }
        .panel { position: relative; z-index: 10; background: rgba(255,255,255,0.9); backdrop-filter: blur(20px); border-top-left-radius: 20px; border-top-right-radius: 20px; padding: 15px; box-shadow: 0 -5px 15px rgba(0,0,0,0.05); max-height: 60vh; overflow-y: auto; }
        .meter-box { background: white; padding: 15px; border-radius: 15px; text-align: center; margin-bottom: 10px; border: 1px solid rgba(0,0,0,0.05); }
        .meter-amount { font-size: 40px; font-weight: 700; color: #000; }
        .btn { width: 100%; padding: 14px; border: none; border-radius: 12px; font-weight: 600; font-size: 16px; cursor: pointer; margin-top: 10px; transition: 0.2s; }
        .btn-start { background: var(--apple-blue); color: white; }
        .btn-stop { background: #FF3B30; color: white; display: none; }
        .history-card { background: white; padding: 10px; border-radius: 10px; margin-top: 10px; font-size: 13px; }
        .history-item { border-bottom: 1px solid #eee; padding: 8px 0; display: flex; justify-content: space-between; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
        .input-group { background: #E9E9EB; padding: 8px; border-radius: 8px; }
        .input-group label { display: block; font-size: 10px; color: #8E8E93; }
        input { width: 100%; border: none; background: transparent; font-size: 14px; font-weight: 500; outline: none; }
    </style>
</head>
<body>

<div id="map"></div>

<div class="panel">
    <div class="meter-box">
        <div class="meter-amount" id="dispTotal">$80</div>
        <div style="font-size: 12px; color: #8E8E93;">距離 <span id="dispDist" style="color:#000">0.00</span> km | 時間 <span id="dispTime" style="color:#000">0</span> min</div>
        <button class="btn btn-start" id="startBtn" onclick="toggleGPS(true)">🚕 開始載客</button>
        <button class="btn btn-stop" id="stopBtn" onclick="toggleGPS(false)">🏁 到達目的地</button>
    </div>

    <h2>⚙️ 費率設定</h2>
    <div class="grid">
        <div class="input-group"><label>起跳價</label><input type="number" id="cfgBase" value="80"></div>
        <div class="input-group"><label>每分鐘</label><input type="number" id="cfgMin" value="3"></div>
    </div>

    <h2>📜 歷史紀錄</h2>
    <div class="history-card" id="historyList">
        <div style="color:#999; text-align:center;">尚無載客紀錄</div>
    </div>
</div>

<script>
    var map = L.map('map', { zoomControl: false }).setView([25.03, 121.56], 15);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);
    var path = L.polyline([], {color: '#007AFF', weight: 6}).addTo(map);
    var marker = L.circleMarker([25.03, 121.56], {radius: 8, color: 'white', fillColor: '#007AFF', fillOpacity: 1, weight: 3}).addTo(map);

    var watchId = null, totalDist = 0, lastPos = null, startTime = null, wakeLock = null;

    // 載入舊紀錄
    window.onload = function() { displayHistory(); };

    // 禁止螢幕休眠的魔法
    async function requestWakeLock() {
        try {
            if ('wakeLock' in navigator) {
                wakeLock = await navigator.wakeLock.request('screen');
            }
        } catch (err) { console.log("螢幕防休眠失效"); }
    }

    function getFare(d, t) {
        let base = parseFloat(document.getElementById('cfgBase').value);
        let minRate = parseFloat(document.getElementById('cfgMin').value);
        return Math.round(base + (d * 15) + (t * minRate));
    }

    function toggleGPS(start) {
        if (start) {
            requestWakeLock(); // 啟動時不讓螢幕關掉
            totalDist = 0; startTime = new Date(); lastPos = null; path.setLatLngs([]);
            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('stopBtn').style.display = 'block';
            watchId = navigator.geolocation.watchPosition(pos => {
                let cur = [pos.coords.latitude, pos.coords.longitude];
                map.setView(cur, 17); marker.setLatLng(cur); path.addLatLng(cur);
                if (lastPos) totalDist += map.distance(lastPos, cur) / 1000;
                lastPos = cur;
                let min = Math.floor((new Date() - startTime) / 60000);
                document.getElementById('dispTotal').innerText = "$" + getFare(totalDist, min);
                document.getElementById('dispDist').innerText = totalDist.toFixed(2);
                document.getElementById('dispTime').innerText = min;
            }, null, {enableHighAccuracy: true});
        } else {
            saveRecord();
            navigator.geolocation.clearWatch(watchId);
            if (wakeLock) wakeLock.release(); // 停止後恢復正常省電
            location.reload();
        }
    }

    function saveRecord() {
        let record = {
            time: new Date().toLocaleString(),
            dist: document.getElementById('dispDist').innerText,
            amount: document.getElementById('dispTotal').innerText
        };
        let history = JSON.parse(localStorage.getItem('taxiHistory') || '[]');
        history.unshift(record);
        localStorage.setItem('taxiHistory', JSON.stringify(history.slice(0, 10))); // 只留最近10筆
    }

    function displayHistory() {
        let history = JSON.parse(localStorage.getItem('taxiHistory') || '[]');
        let list = document.getElementById('historyList');
        if (history.length > 0) {
            list.innerHTML = history.map(h => `
                <div class="history-item">
                    <span>${h.time}</span>
                    <span>${h.dist}km</span>
                    <span style="font-weight:bold; color:var(--apple-blue)">${h.amount}</span>
                </div>
            `).join('');
        }
    }
</script>
</body>
</html>
