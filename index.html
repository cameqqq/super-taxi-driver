<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>全能計程車司機助手 Pro</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root { --apple-blue: #007AFF; --apple-bg: #F2F2F7; --apple-red: #FF3B30; --apple-green: #34C759; }
        body { font-family: -apple-system, sans-serif; margin: 0; background: var(--apple-bg); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        #map { flex: 1; width: 100%; z-index: 1; }
        .panel { position: relative; z-index: 10; background: rgba(255,255,255,0.95); backdrop-filter: blur(20px); border-top-left-radius: 24px; border-top-right-radius: 24px; padding: 20px; box-shadow: 0 -5px 20px rgba(0,0,0,0.08); max-height: 65vh; overflow-y: auto; }
        .meter-box { background: #1C1C1E; color: white; padding: 20px; border-radius: 18px; text-align: center; margin-bottom: 20px; }
        .meter-amount { font-size: 54px; font-weight: 700; color: var(--apple-red); font-family: 'Courier New', monospace; }
        .btn { width: 100%; padding: 16px; border: none; border-radius: 14px; font-weight: 600; font-size: 18px; cursor: pointer; margin-top: 10px; transition: 0.2s; }
        .btn-start { background: var(--apple-blue); color: white; }
        .btn-stop { background: var(--apple-red); color: white; display: none; }
        h2 { font-size: 18px; font-weight: 700; margin: 20px 0 10px; color: #000; border-left: 5px solid #FFD700; padding-left: 10px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .input-group { background: white; padding: 10px; border-radius: 12px; border: 1px solid #E5E5EA; }
        .input-group label { display: block; font-size: 12px; color: #8E8E93; margin-bottom: 4px; }
        input { width: 100%; border: none; font-size: 16px; font-weight: 600; outline: none; background: transparent; }
        .history-item { background: white; padding: 15px; border-radius: 14px; margin-bottom: 12px; border: 1px solid #E5E5EA; }
        .history-btn { margin-top: 10px; color: var(--apple-blue); font-size: 14px; font-weight: 600; cursor: pointer; text-decoration: underline; }
    </style>
</head>
<body>

<div id="map"></div>

<div class="panel">
    <div class="meter-box">
        <div class="meter-amount" id="dispTotal">$80</div>
        <div style="font-size: 14px; color: #AEAEB2; margin-top: 8px;">
            距離 <span id="dispDist" style="color:white">0.00</span> km | 時間 <span id="dispTime" style="color:white">0</span> min
        </div>
        <button class="btn btn-start" id="startBtn" onclick="toggleGPS(true)">🚀 開始自動跳錶</button>
        <button class="btn btn-stop" id="stopBtn" onclick="toggleGPS(false)">到達目的地 (停止)</button>
    </div>

    <h2>⚙️ 費率設定</h2>
    <div class="grid">
        <div class="input-group"><label>起跳價</label><input type="number" id="cfgBase" value="80"></div>
        <div class="input-group"><label>每分鐘費</label><input type="number" id="cfgMin" value="3"></div>
        <div class="input-group" style="grid-column: span 2; background: #FFF9C4;"><label>長程加價切換點 (km)</label><input type="number" id="cfgThreshold" value="15"></div>
        <div class="input-group"><label>短程 /km</label><input type="number" id="cfgRate1" value="15"></div>
        <div class="input-group"><label>長程 /km</label><input type="number" id="cfgRate2" value="25"></div>
    </div>

    <h2>📜 行程歷史紀錄</h2>
    <div id="historyList"></div>
</div>

<script>
    var map = L.map('map', { zoomControl: false }).setView([25.03, 121.56], 15);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);
    var livePath = L.polyline([], {color: '#007AFF', weight: 6}).addTo(map);
    var liveMarker = L.circleMarker([25.03, 121.56], {radius: 8, color: 'white', fillColor: '#007AFF', fillOpacity: 1, weight: 3}).addTo(map);
    var routeLayer = L.layerGroup().addTo(map);

    var watchId = null, totalDist = 0, lastPos = null, startTime = null, wakeLock = null, startPos = null;

    window.onload = function() { displayHistory(); };

    function calculateFare(d, t) {
        let base = parseFloat(document.getElementById('cfgBase').value);
        let tr = parseFloat(document.getElementById('cfgMin').value);
        let thres = parseFloat(document.getElementById('cfgThreshold').value);
        let r1 = parseFloat(document.getElementById('cfgRate1').value);
        let r2 = parseFloat(document.getElementById('cfgRate2').value);
        let distFee = (d <= thres) ? (d * r1) : (thres * r1 + (d - thres) * r2);
        return Math.round(base + distFee + (t * tr));
    }

    function toggleGPS(start) {
        if (start) {
            if ('wakeLock' in navigator) navigator.wakeLock.request('screen').then(l => wakeLock = l);
            totalDist = 0; startTime = new Date(); lastPos = null; livePath.setLatLngs([]); routeLayer.clearLayers();
            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('stopBtn').style.display = 'block';
            navigator.geolocation.getCurrentPosition(p => { startPos = [p.coords.latitude, p.coords.longitude]; });
            watchId = navigator.geolocation.watchPosition(pos => {
                let cur = [pos.coords.latitude, pos.coords.longitude];
                map.setView(cur, 17); liveMarker.setLatLng(cur); livePath.addLatLng(cur);
                if (lastPos) totalDist += map.distance(lastPos, cur) / 1000;
                lastPos = cur;
                let min = Math.floor((new Date() - startTime) / 60000);
                document.getElementById('dispTotal').innerText = "$" + calculateFare(totalDist, min);
                document.getElementById('dispDist').innerText = totalDist.toFixed(2);
                document.getElementById('dispTime').innerText = min;
            }, null, {enableHighAccuracy: true});
        } else {
            saveHistory(startPos, lastPos);
            navigator.geolocation.clearWatch(watchId);
            if (wakeLock) wakeLock.release();
            setTimeout(() => { location.reload(); }, 500);
        }
    }

    function saveHistory(s, e) {
        if(!s || !e) return;
        let record = { time: new Date().toLocaleString(), dist: document.getElementById('dispDist').innerText, amount: document.getElementById('dispTotal').innerText, start: s, end: e };
        let history = JSON.parse(localStorage.getItem('taxiHistoryFinal') || '[]');
        history.unshift(record);
        localStorage.setItem('taxiHistoryFinal', JSON.stringify(history.slice(0, 10)));
    }

    function displayHistory() {
        let history = JSON.parse(localStorage.getItem('taxiHistoryFinal') || '[]');
        let list = document.getElementById('historyList');
        list.innerHTML = history.length ? history.map(h => `
            <div class="history-item">
                <div style="display:flex;justify-content:space-between;font-size:12px;color:#8E8E93"><span>${h.time}</span><span>${h.dist} km</span></div>
                <div style="font-size:20px; font-weight:bold; color:var(--apple-blue); margin:8px 0;">${h.amount}</div>
                <div class="history-btn" onclick='drawRoute(${JSON.stringify(h.start)}, ${JSON.stringify(h.end)})'>📍 查看起終點路線圖</div>
            </div>
        `).join('') : '<div style="text-align:center;color:#999;padding:20px;">尚無紀錄</div>';
    }

    function drawRoute(s, e) {
        routeLayer.clearLayers();
        L.marker(s, {icon: L.divIcon({className:'', html:'<div style="background:var(--apple-green);width:14px;height:14px;border:2px solid white;border-radius:50%;"></div>'})}).addTo(routeLayer).bindPopup("起點").openPopup();
        L.marker(e, {icon: L.divIcon({className:'', html:'<div style="background:var(--apple-red);width:14px;height:14px;border:2px solid white;border-radius:50%;"></div>'})}).addTo(routeLayer).bindPopup("終點");
        let line = L.polyline([s, e], {color: '#8E8E93', weight: 3, dashArray: '8, 12'}).addTo(routeLayer);
        map.fitBounds(line.getBounds(), {padding: [50, 50]});
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }
</script>
</body>
</html>
